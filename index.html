<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام قيد التطوير | KIB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        * {
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            margin: 0;
            padding: 0;
        }

        .bg-kib-primary { background-color: #7A2128; }
        .text-kib-primary { color: #7A2128; }
        .border-kib-primary { border-color: #7A2128; }
        
        .bg-kib-secondary { background-color: #F5B335; }
        .text-kib-secondary { color: #F5B335; }

        /* تأثير النبض المتوهج للخلفية */
        .glow-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(245,179,53,0.15) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        /* شريط التحميل الوهمي */
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #7A2128, #F5B335);
            width: 0%;
            border-radius: 10px;
            animation: loadProgress 2s infinite ease-in-out alternate;
        }

        @keyframes loadProgress {
            0% { width: 10%; }
            100% { width: 90%; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden p-4">

    <!-- دوائر التوهج في الخلفية -->
    <div class="glow-circle"></div>

    <!-- البطاقة الرئيسية -->
    <div class="bg-white/90 backdrop-blur-xl w-full max-w-lg p-8 md:p-12 rounded-[2rem] shadow-2xl border-t-4 border-b-4 border-t-[#F5B335] border-b-[#7A2128] relative z-10 text-center transform transition-all hover:scale-[1.02] duration-500">
        
        <!-- الشعار -->
        <div class="flex justify-center mb-8 relative">
            <div class="absolute inset-0 bg-[#F5B335] blur-lg opacity-20 rounded-full w-24 h-24 mx-auto"></div>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSTxIhDB302tFWezCQwkWsaUd6V0v0dKMpBIA&s" alt="KIB Logo" class="h-24 w-24 object-contain rounded-2xl shadow-lg bg-white p-2 relative z-10">
        </div>

        <!-- الأيقونات المتحركة -->
        <div class="flex justify-center items-center gap-4 mb-6 text-[#7A2128]">
            <i class="fas fa-cog fa-spin text-4xl"></i>
            <i class="fas fa-tools text-3xl opacity-80"></i>
            <i class="fas fa-laptop-code text-4xl"></i>
        </div>

        <!-- النصوص -->
        <h1 class="text-3xl md:text-4xl font-black text-gray-800 mb-4">النظام قيد التطوير</h1>
        <p class="text-gray-500 text-sm md:text-base font-semibold leading-relaxed mb-8 px-4">
            نعمل بشغف خلف الكواليس لإعداد تجربة رقمية جديدة كلياً تليق بتطلعاتكم. النظام سيكون متاحاً قريباً!
        </p>

        <!-- شريط التحميل -->
        <div class="mb-6">
            <div class="flex justify-between text-xs font-bold text-gray-400 mb-2">
                <span>جاري التحديث والتطوير...</span>
                <span class="text-kib-secondary animate-pulse">قريباً</span>
            </div>
            <div class="progress-bar-container shadow-inner">
                <div class="progress-bar-fill"></div>
            </div>
        </div>

        <!-- زر تواصل أو عودة (اختياري) -->
        <button onclick="window.history.back()" class="mt-4 bg-gray-50 hover:bg-gray-100 text-gray-700 font-bold py-3 px-8 rounded-xl transition duration-300 border border-gray-200 shadow-sm text-sm">
            <i class="fas fa-arrow-right ml-2"></i> العودة للصفحة السابقة
        </button>

    </div>

    <!-- التذييل -->
    <div class="absolute bottom-6 text-center w-full z-10">
        <p class="text-gray-400 text-xs font-semibold">
            &copy; 2026 بنك الكريمي للتمويل الأصغر الإسلامي. جميع الحقوق محفوظة.
        </p>
    </div>

</body>
</html>
